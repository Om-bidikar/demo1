<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Demo</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial, sans-serif;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* container */
.container{
position:relative;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* text */
.text{
font-size:clamp(22px,4vw,40px);
opacity:0;
transform:translateY(20px);
transition:opacity 1.5s ease, transform 1.5s ease;
}
.show{
opacity:1;
transform:translateY(0);
}

/* glow */
.glow{
text-shadow:0 0 20px #ff4da6,0 0 40px #ff4da6;
}

/* cake */
#cake{
position:absolute;
bottom:20%;
font-size:clamp(60px,8vw,100px);
opacity:0;
transition:opacity 1.5s;
}

/* final message */
#final{
position:absolute;
font-size:clamp(20px,3vw,30px);
opacity:0;
transition:opacity 2s;
}

/* balloons */
.balloon{
position:fixed;
bottom:-80px;
font-size:clamp(20px,3vw,40px);
animation:rise 10s linear forwards;
pointer-events:none;
}
@keyframes rise{
to{transform:translateY(-130vh);}
}

/* particles */
.spark{
position:fixed;
width:5px;
height:5px;
border-radius:50%;
background:white;
animation:floatUp 6s linear forwards;
pointer-events:none;
}
@keyframes floatUp{
to{transform:translateY(-120vh);opacity:0;}
}

/* fade overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
opacity:0;
transition:opacity 1.5s;
pointer-events:none;
}
</style>
</head>

<body>

<div class="container">
<div id="text" class="text"></div>
<div id="cake">🎂</div>
<div id="final"></div>
</div>

<div id="overlay" class="overlay"></div>

<!-- optional music -->
<audio id="music" src="music.mp3"></audio>

<script>

const text = document.getElementById("text");
const cake = document.getElementById("cake");
const final = document.getElementById("final");
const overlay = document.getElementById("overlay");
const music = document.getElementById("music");

/* transition */
function fade(callback){
overlay.style.opacity=1;
setTimeout(()=>{
callback();
overlay.style.opacity=0;
},1500);
}

/* timeline */

setTimeout(()=>{
text.innerHTML="Hey...";
text.classList.add("show");
},1000);

setTimeout(()=>{
text.innerHTML="I made something special...";
},4000);

setTimeout(()=>{
text.innerHTML="Just for you 💖";
text.classList.add("glow");
startParticles();
},7000);

setTimeout(()=>{
fade(()=>{
startBalloons();
});
},10000);

setTimeout(()=>{
fade(()=>{
text.classList.remove("show");
cake.style.opacity=1;
});
},14000);

setTimeout(()=>{
fade(()=>{
cake.style.opacity=0;
final.innerHTML="Happy Birthday 🎉<br>You are truly special 💖";
final.style.opacity=1;
});
},19000);

/* particles */
function startParticles(){
setInterval(()=>{
let s=document.createElement("div");
s.className="spark";
s.style.left=Math.random()*100+"vw";
document.body.appendChild(s);
setTimeout(()=>s.remove(),6000);
},150);
}

/* balloons */
function startBalloons(){
setInterval(()=>{
let b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";
b.style.left=Math.random()*window.innerWidth+"px";
document.body.appendChild(b);
setTimeout(()=>b.remove(),10000);
},500);
}

/* music start on first click */
document.addEventListener("click",()=>{
music.play().catch(()=>{});
},{once:true});

</script>

</body>
</html>
